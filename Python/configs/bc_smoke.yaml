behaviors:
  RoboticPaintingAgent:
    trainer_type: ppo
    hyperparameters:
      batch_size: 64
      buffer_size: 1024
      learning_rate: 3.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 64
      num_layers: 2
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 0.0
    behavioral_cloning:
      demo_path: UnityProject/Assets/ML-Agents/Demonstrations/StyleA
      strength: 1.0
      steps: 3000
      batch_size: 64
      samples_per_update: 32
    max_steps: 3000
    time_horizon: 64
    summary_freq: 500
